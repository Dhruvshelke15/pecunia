name: Deploy Pecunia

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install root deps
        run: npm ci

      - name: Type-check backend
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Create stub aws-exports for CI
        run: |
          cat > frontend/src/aws-exports.ts << 'EOF'
          export const awsConfig = {
            Auth: {
              Cognito: {
                userPoolId: 'us-east-1_PLACEHOLDER',
                userPoolClientId: 'PLACEHOLDER',
              },
            },
            API: {
              REST: {
                PecuniaAPI: {
                  endpoint: 'https://placeholder.execute-api.us-east-1.amazonaws.com/prod',
                  region: 'us-east-1',
                },
              },
            },
          };
          EOF

      - name: Type-check frontend
        run: cd frontend && npx tsc -b --noEmit

      - name: Lint frontend
        run: cd frontend && npm run lint

  build-frontend:
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_USER_POOL_ID: ${{ secrets.VITE_USER_POOL_ID }}
          VITE_USER_POOL_CLIENT_ID: ${{ secrets.VITE_USER_POOL_CLIENT_ID }}

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  deploy:
    needs: build-frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install root deps
        run: npm ci

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: CDK deploy
        run: npx cdk deploy --all --require-approval never
        env:
          FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
          ANTHROPIC_SECRET_ARN: ${{ secrets.ANTHROPIC_SECRET_ARN }}
